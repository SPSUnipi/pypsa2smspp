name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
  - cron: "0 5 * * 1-5"
  workflow_dispatch:

# Cancel any in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_with_smspp_conda:
    # Test package with SMS++ installed from conda-forge
    name: Test package with SMSpp from conda-forge (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - "3.13"
    defaults:
      run:
        shell: bash -el {0}
    env:
      MPLBACKEND: Agg  # https://github.com/orgs/community/discussions/26434
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Needed for setuptools_scm

    - name: Setup Miniforge
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniforge-variant: Miniforge3
        miniforge-version: latest
        activate-environment: test-env
        python-version: ${{ matrix.python-version }}

    - name: Install smspp-project from conda-forge
      run: |
        conda install -c conda-forge smspp-project -y

    - name: Install package and dependencies
      run: |
        pip install .[dev]

    - name: List environment
      run: |
        conda list

    - name: Test package with SMSpp
      run: |
        pytest
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-data-${{ matrix.python-version }}
        path: test\output\test
  
  test_with_smspp:
    # Test package build in matrix of OS and Python versions
    name: Test package with SMSpp
    needs:
    - test_with_smspp_conda
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - "3.12"
        os:
        - ubuntu-latest
    env:
      MPLBACKEND: Agg  # https://github.com/orgs/community/discussions/26434
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Needed for setuptools_scm

    - name: Set up Python ${{ matrix.python-version }} on ${{ matrix.os }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]

    - name: Install SMSpp (linux)
      if: runner.os == 'Linux'
      run: |
        cd $HOME
        git clone -b develop https://gitlab.com/smspp/smspp-project.git
        cd smspp-project
        chmod +x ./INSTALL.sh
        sudo ./INSTALL.sh --without-scip --without-gurobi --without-cplex
        echo "/opt/smspp-project/bin" >> $GITHUB_PATH
        echo "/opt/smspp-project/build/InvestmentBlock/test" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=/opt/smspp-project/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    - name: Install SMSpp (macOS)
      if: runner.os == 'macOS'
      run: |
        cd $HOME
        git clone -b develop https://gitlab.com/smspp/smspp-project.git
        cd smspp-project
        chmod +x ./INSTALL.sh
        ./INSTALL.sh --without-scip --without-cplex
        echo "$HOME/smspp-project/bin" >> $GITHUB_PATH
        echo "$HOME/smspp-project/build/InvestmentBlock/test" >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=$HOME/smspp-project/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

    - name: Install SMSpp (windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        cd C:\
        git clone -b develop https://gitlab.com/smspp/smspp-project.git
        cd smspp-project
        .\INSTALL.ps1 --without-scip --without-cplex
        echo "C:\smspp-project\Release\bin" >> $GITHUB_PATH
        echo "C:\smspp-project\build\InvestmentBlock\test\Release" >> $GITHUB_PATH

    - name: Test package with SMSpp
      run: |
        echo "PATH is now: $PATH"
        echo "LD_LIBRARY_PATH is now: $LD_LIBRARY_PATH"
        pytest
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-data-${{ matrix.python-version }}
        path: test\output\test
